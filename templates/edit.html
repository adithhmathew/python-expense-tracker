{% extends "base.html" %}

{% block content %}
<h2 class="mb-4">Edit Expense</h2>

<form method="POST">
    <input type="text" name="amount" value="{{ expense[0] }}" class="form-control mb-2" placeholder="Amount">

    <input type="text" name="category" value="{{ expense[1] }}" class="form-control mb-2" placeholder="Category">

    <input type="text" name="desc" value="{{ expense[2] }}" class="form-control mb-2" placeholder="Description">

    <input type="date" name="date" value="{{ expense[3] }}" class="form-control mb-3">

    <button class="btn btn-success">Update Expense</button>
</form>
{% endblock %}
